name: Tandang Sora

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, edited]
  issue_comment:
    types: [created]

jobs:
  describe_pr:
    if: github.event.sender.type != 'Bot'

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      issues: write

    concurrency:
      group: pr-description-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and update PR description
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEM_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = Number(process.env.PR_NUMBER);
            const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';

            const isPR = context.eventName === 'pull_request';

            const isPalihugComment =
              context.eventName === 'issue_comment' &&
              context.payload.issue?.pull_request &&
              (context.payload.comment?.body || '')
                .trim()
                .toLowerCase()
                .startsWith('palihug');

            // ❌ Hard stop if not a valid trigger
            if (!isPR && !isPalihugComment) {
              core.info('Skipping: not a palihug trigger or PR event');
              return;
            }

            const target = isPalihugComment
              ? { type: 'comment', id: context.payload.comment.id }
              : { type: 'issue', id: prNumber };

            async function react(type) {
              try {
                if (target.type === 'comment') {
                  await github.rest.reactions.createForIssueComment({
                    owner,
                    repo,
                    comment_id: target.id,
                    content: type,
                  });
                } else {
                  await github.rest.reactions.createForIssue({
                    owner,
                    repo,
                    issue_number: target.id,
                    content: type,
                  });
                }
              } catch (e) {
                core.info(`Reaction failed (${type}): ${e.message}`);
              }
            }

            await react('eyes');

            const pr = (await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            })).data;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            const MAX_PATCH = 12000;
            let remaining = MAX_PATCH;

            const fileSummary = files.map(f => {
              let s = `- ${f.filename} (${f.status}, +${f.additions}/-${f.deletions})`;

              if (f.patch && remaining > 0) {
                const snippet = f.patch.slice(0, remaining);
                remaining -= snippet.length;
                s += `\n\`\`\`diff\n${snippet}\n\`\`\``;
              }

              return s;
            }).join('\n\n');

            const requiredHeadings = [
              '## What does this PR do?',
              '## Why did you choose this solution?',
              '## What is the dependency graph of the changes?',
              '## How to test/verify?',
            ];

            const prompt = [
              'Write a PR description from the PR metadata and diff below.',
              'Return Markdown only. Use exactly these headings:',
              ...requiredHeadings,
              '',
              'Rules:',
              '- No extra sections',
              '- No code fences',
              '- First 3 sections: bullet points only',
              '- Testing section: numbered steps only',
              '',
              'Existing PR Description:',
              pr.body || '(empty)',
              '',
              'Changed files and patches:',
              fileSummary || '(no changes)',
            ].join('\n');

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  generationConfig: { temperature: 0.2 },
                  contents: [{
                    role: 'user',
                    parts: [{ text: prompt }],
                  }],
                }),
              }
            );

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(err);
              return;
            }

            const data = await response.json();
            const generated = data?.candidates?.[0]?.content?.parts
              ?.map(p => p.text || '')
              .join('\n')
              ?.trim();

            if (!generated) {
              core.setFailed('Empty response');
              return;
            }

            const stripFence = (t) => {
              const m = t.trim().match(/^```(?:md|markdown)?\s*([\s\S]*?)```$/i);
              return m ? m[1].trim() : t.trim();
            };

            const cleaned = stripFence(generated);

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body: cleaned,
            });

            core.info(`Updated PR #${prNumber}`);

            await react('rocket');