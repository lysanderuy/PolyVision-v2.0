name: Tandang Sora

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, edited]
  issue_comment:
    types: [created]

jobs:
  describe_pr:
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name != 'issue_comment' ||
        (
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, 'palihug')
        )
      )

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      issues: write   # ✅ FIX: required for reactions

    concurrency:
      group: pr-description-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and update PR description
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEM_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isComment = context.eventName === 'issue_comment';
            const { owner, repo } = context.repo;

            async function react(type) {
              if (!isComment) return;

              try {
                if (!context.payload.comment?.id) return;

                await github.rest.reactions.createForIssueComment({
                  owner,
                  repo,
                  comment_id: context.payload.comment.id,
                  content: type,
                });
              } catch (e) {
                core.info(`Reaction failed: ${e.message}`);
              }
            }

            const prNumber = Number(process.env.PR_NUMBER);
            const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';

            try {
              if (!process.env.GEMINI_API_KEY) {
                core.setFailed('Missing GEM_KEY secret.');
                await react('confused');
                return;
              }

              const pr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              })).data;

              const files = await github.paginate(
                github.rest.pulls.listFiles,
                {
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100,
                }
              );

              const MAX_PATCH = 12000;
              let remaining = MAX_PATCH;

              const fileSummary = files.map(f => {
                let s = `- ${f.filename} (${f.status}, +${f.additions}/-${f.deletions})`;

                if (f.patch && remaining > 0) {
                  const snippet = f.patch.slice(0, remaining);
                  remaining -= snippet.length;
                  s += `\n\`\`\`diff\n${snippet}\n\`\`\``;
                }

                return s;
              }).join('\n\n');

              const requiredHeadings = [
                '## What does this PR do?',
                '## Why did you choose this solution?',
                '## What is the dependency graph of the changes?',
                '## How to test/verify?',
              ];

              const prompt = [
                'Write a PR description.',
                'Use ONLY these headings:',
                ...requiredHeadings,
                '',
                'Rules:',
                '- bullets for first 3 sections',
                '- numbered steps for testing',
                '- no extra sections',
                '',
                `Title: ${pr.title}`,
                `Base: ${pr.base.ref}`,
                `Head: ${pr.head.ref}`,
                '',
                'Existing:',
                pr.body || '(empty)',
                '',
                'Diff:',
                fileSummary || '(no changes)',
              ].join('\n');

              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    generationConfig: { temperature: 0.2 },
                    contents: [{
                      role: 'user',
                      parts: [{ text: prompt }],
                    }],
                  }),
                }
              );

              if (!response.ok) {
                const err = await response.text();
                core.setFailed(err);
                await react('confused');
                return;
              }

              const data = await response.json();
              const generated = data?.candidates?.[0]?.content?.parts
                ?.map(p => p.text || '')
                .join('\n')
                ?.trim();

              if (!generated) {
                core.setFailed('Empty response');
                await react('confused');
                return;
              }

              const stripFence = (t) => {
                const m = t.trim().match(/^```(?:md|markdown)?\s*([\s\S]*?)```$/i);
                return m ? m[1].trim() : t.trim();
              };

              const cleaned = stripFence(generated);

              const missing = requiredHeadings.filter(h => !cleaned.includes(h));
              if (missing.length) {
                core.setFailed('Missing headings');
                await react('confused');
                return;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: cleaned,
              });

              core.info(`Updated PR #${prNumber}`);

              // 👀 / 🚀 flow (comment mode only)
              if (isComment) {
                await react('rocket');
              }

            } catch (err) {
              core.setFailed(err.message);
              await react('confused');
            }